<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>QSO Search · BA8AHG AR Website</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0b1424 0%, #121e2f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      padding: 1.5rem;
      color: #eef3fc;
    }

    .main-card {
      max-width: 700px;
      width: 100%;
      background: rgba(18, 30, 45, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(74, 144, 226, 0.3);
      border-radius: 2.5rem;
      box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 180, 255, 0.1) inset;
      padding: 2.5rem 2.2rem;
      transition: all 0.2s;
    }

    /* 头部与导航 */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-left i {
      font-size: 2.4rem;
      color: #5bb4ff;
      filter: drop-shadow(0 0 8px rgba(91, 180, 255, 0.4));
    }

    .header-left h1 {
      font-weight: 600;
      font-size: 2.2rem;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, #f0f9ff 0%, #c0e0ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 1.2rem;
    }

    .nav-links a {
      color: #b0c9e8;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid transparent;
    }

    .nav-links a:hover {
      color: #fff;
      background: rgba(74, 144, 226, 0.15);
      border-color: rgba(74, 144, 226, 0.3);
    }

    .nav-links a.active {
      background: #1e4f77;
      color: #fff;
      border-color: #2e6a9e;
    }

    .subhead {
      color: #b8d0ea;
      margin-bottom: 2rem;
      font-size: 1.05rem;
      border-left: 4px solid #2e7eb0;
      padding-left: 1.2rem;
    }

    /* 介绍区域 */
    .intro-box {
      background: rgba(8, 22, 38, 0.6);
      border-radius: 1.8rem;
      padding: 1.5rem 1.8rem;
      margin-bottom: 2.8rem;
      border: 1px solid #2a5f88;
    }

    .intro-box p {
      margin-bottom: 0.8rem;
      color: #d0e2ff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .intro-box i {
      color: #6db9ff;
      width: 1.6rem;
      text-align: center;
    }

    .highlight {
      color: #ffd966;
      font-weight: 600;
    }

    /* 查询框 */
    .query-area {
      text-align: center;
    }

    .query-label {
      display: block;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.85rem;
      color: #9bb9da;
      margin-bottom: 0.8rem;
    }

    .input-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 0.5rem;
    }

    .id-input {
      flex: 2 1 240px;
      background: #0c1e30;
      border: 1.5px solid #2e6a9e;
      border-radius: 3rem;
      padding: 1rem 1.5rem;
      font-size: 1.2rem;
      color: #fff;
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', monospace;
      text-align: center;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }

    .id-input:focus {
      border-color: #5bb4ff;
      box-shadow: 0 0 0 4px rgba(91, 180, 255, 0.2);
    }

    .id-input::placeholder {
      color: #4a7090;
      font-size: 1rem;
      opacity: 0.7;
    }

    .query-btn {
      background: #1e4f77;
      border: none;
      border-bottom: 4px solid #0a1a2a;
      color: white;
      padding: 1rem 2.5rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 1.1rem;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 8px 0 #0a1a2a;
      transform: translateY(-2px);
    }

    .query-btn:hover {
      background: #256a9c;
      transform: translateY(0);
      box-shadow: 0 6px 0 #0a1a2a;
    }

    .query-btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #0a1a2a;
    }

    .hint {
      margin-top: 1.2rem;
      font-size: 0.9rem;
      color: #7f9fc0;
    }

    .hint i {
      margin-right: 5px;
    }

    .plan-link {
      margin-top: 1.4rem;
    }

    .plan-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.95rem 1.4rem;
      border-radius: 999px;
      background: rgba(30, 79, 119, 0.95);
      color: #f4fbff;
      font-weight: 600;
      border: 1px solid rgba(93, 172, 255, 0.22);
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .plan-btn:hover {
      transform: translateY(-1px);
      background: rgba(55, 106, 160, 0.98);
      box-shadow: 0 12px 24px rgba(20, 72, 130, 0.25);
    }

    .footer-note {
      margin-top: 2.8rem;
      text-align: center;
      color: #5f83a8;
      font-size: 0.8rem;
      border-top: 1px dashed #234a6b;
      padding-top: 1.5rem;
    }

    .error-msg {
      color: #ff9e8f;
      margin-top: 10px;
      min-height: 24px;
      font-size: 0.9rem;
    }

    @media (max-width: 500px) {
      .main-card { padding: 1.8rem 1.2rem; }
      .header-left h1 { font-size: 1.8rem; }
      .id-input { font-size: 1rem; }
      .header { flex-direction: column; align-items: flex-start; }
      .nav-links { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
<div class="main-card">
  
  <!-- 头部 + 导航 -->
  <div class="header">
    <div class="header-left">
      <i class="fas fa-satellite-dish"></i>
      <h1>QSO·日志查询</h1>
    </div>
  </div>

  <div class="subhead">
    <i class="fas fa-radio" style="margin-right: 8px;"></i> BA8AHG · 业余无线电通联记录
  </div>

  <!-- 简短介绍 -->
  <div class="intro-box">
    <p>
      <i class="fas fa-info-circle"></i>
      <span><span class="highlight">QSO</span> (Contact) 是业余无线电中的双向通信确认。每次通联都会生成唯一的卡片编号。</span>
    </p>
    <p>
      <i class="fas fa-id-card"></i>
      <span>输入 <strong>Card ID</strong>（如 <code>A20251001001DYZ</code>）即可查看完整通联信息，包括呼号、信号报告、QSL状态等。</span>
    </p>
    <p>
      <i class="fas fa-database"></i>
      <span>当前系统为静态页面，所有 QSO 详情页均已预生成。</span>
    </p>
  </div>

  <!-- 查询模块 -->
  <div class="query-area">
    <span class="query-label"><i class="fas fa-search"></i> 输入卡片编号</span>
    <div class="input-group">
      <input type="text" id="cardIdInput" class="id-input" placeholder="例如 A20251001001DYZ" value="" autofocus>
      <button class="query-btn" id="queryBtn"><i class="fas fa-arrow-right"></i> 查看 QSO</button>
    </div>
    <div id="errorMessage" class="error-msg"></div>
    <div class="hint">
      <i class="far fa-lightbulb"></i> 支持格式：A20251001001DYZ 、 B00000001 等
    </div>
    <div class="plan-link">
      <a class="plan-btn" href="./sendplan.html"><i class="fas fa-box-open"></i> 查看卡片寄递计划</a>
    </div>
  </div>

  <div class="footer-note">
    <i class="fas fa-microchip"></i> BA8AHG AR Website · 73 !
  </div>
</div>

<script>
  (function() {
    const input = document.getElementById('cardIdInput');
    const queryBtn = document.getElementById('queryBtn');
    const errorDiv = document.getElementById('errorMessage');

    function cleanCardId(raw) {
      return raw.trim().replace(/^#+/, '').replace(/\s+/g, '');
    }

    function goToQsoPage() {
      let rawValue = input.value;
      const cardId = cleanCardId(rawValue);
      
      if (!cardId) {
        errorDiv.textContent = '❌ 请输入卡片编号';
        return;
      }
      if (!/^[\w\-\.]+$/.test(cardId)) {
        errorDiv.textContent = '❌ 编号包含无效字符，请检查';
        return;
      }

      errorDiv.textContent = '';
      let targetUrl;
      if (cardId.startsWith('A')) {
        if (cardId.length < 12) {
          errorDiv.textContent = '❌ A类编号长度不足，至少需要12位';
          return;
        }
        const part1 = cardId.slice(1, 9);
        const part2 = cardId.slice(9, 12);
        targetUrl = `./qso/${part1}/${part2}`;
      } else {
        targetUrl = `./qso/${cardId}`;
      }
      
      const newWindow = window.open(targetUrl, '_blank');
      if (!newWindow || newWindow.closed) {
        window.location.href = targetUrl;
      }
    }

    queryBtn.addEventListener('click', function(e) {
      e.preventDefault();
      goToQsoPage();
    });
    input.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        goToQsoPage();
      }
    });
    input.addEventListener('focus', function() {
      errorDiv.textContent = '';
    });
  })();
</script>
</body>
</html>
